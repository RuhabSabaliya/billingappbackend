version: '3.8'

services:
  billease-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billease-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://billease_user:secret123@billease-postgres:5432/billease?schema=public
      - REDIS_URL=redis://billease-redis:6379
      # Note: FIREBASE env vars must be injected via a .env file locally
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
    depends_on:
      billease-postgres:
        condition: service_healthy
      billease-redis:
        condition: service_healthy
    networks:
      - billease-network

  billease-postgres:
    image: postgres:15-alpine
    container_name: billease-postgres
    restart: always
    environment:
      - POSTGRES_USER=billease_user
      - POSTGRES_PASSWORD=secret123
      - POSTGRES_DB=billease
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billease_user -d billease"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billease-network

  billease-redis:
    image: redis:7-alpine
    container_name: billease-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - billease-network

volumes:
  pgdata:
  redisdata:

networks:
  billease-network:
    driver: bridge
